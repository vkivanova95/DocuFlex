{% extends 'base.html' %}

{% block content %}
<div class="card p-4 shadow-sm">
    {% if message %}
      <div class="alert
                  {% if status == 'success' %}
                    alert-success
                  {% elif status == 'info' %}
                    alert-info
                  {% elif status == 'warning' %}
                    alert-warning
                  {% else %}
                    alert-danger
                  {% endif %}
                  ">
        {{ message|safe }}
      </div>
    {% else %}
      <div class="alert alert-warning">
        Не беше върнато съобщение от сървъра.
      </div>
    {% endif %}
    <a href="{% url 'annexes:annex_archive' %}" class="btn btn-outline-primary mt-2">⬅️ Назад към Регистър на изготвените анекси</a>
</div>
{% endblock %}
